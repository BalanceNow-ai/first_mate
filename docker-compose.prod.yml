version: "3.9"

services:
  # Nginx — reverse proxy & SSL termination
  nginx:
    image: nginx:alpine
    container_name: helm-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - flutter_web:/var/www/flutter:ro
    depends_on:
      - api
    restart: unless-stopped

  # PostgreSQL 16 with pgvector extension
  db:
    image: pgvector/pgvector:pg16
    container_name: helm-db-prod
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-helm} -d ${POSTGRES_DB:-helm_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis — cache, Celery broker, rate limiting
  redis:
    image: redis:7-alpine
    container_name: helm-redis-prod
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Typesense — product search engine
  typesense:
    image: typesense/typesense:27.1
    container_name: helm-typesense-prod
    env_file:
      - .env.prod
    environment:
      TYPESENSE_API_KEY: ${TYPESENSE_API_KEY}
      TYPESENSE_DATA_DIR: /data
    expose:
      - "8108"
    volumes:
      - typesense_data:/data
    restart: unless-stopped

  # FastAPI backend (production)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: production
    container_name: helm-api-prod
    env_file:
      - .env.prod
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      typesense:
        condition: service_started
    restart: unless-stopped

  # Celery worker — background task processing
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: production
    container_name: helm-celery-worker-prod
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat — periodic task scheduler
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
      target: production
    command: celery -A app.celery_app beat --loglevel=info
    container_name: helm-celery-beat-prod
    env_file:
      - .env.prod
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  typesense_data:
  certbot_data:
  flutter_web:
