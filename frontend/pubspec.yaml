name: helm_marine
description: "Helm — New Zealand's smartest marine parts and fishing equipment platform."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  supabase_flutter: ^2.7.0
  intl: ^0.19.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10
  mapbox_gl: ^0.16.0
  photo_view: ^0.15.0
  flutter_markdown: ^0.7.4+3
  flutter_stripe: ^11.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.3
  build_runner: ^2.4.12
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  fonts:
    - family: HelmIcons
      fonts:
        - asset: assets/fonts/HelmIcons.ttf
